<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praxis-Startseite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">&#9764;&#65039;</div>
      <div>
        <h1 class="header-title" id="praxisName">Praxis Dr. Florian Rasche</h1>
        <p class="header-subtitle" id="praxisSubtitle">Facharzt fuer Allgemeinmedizin</p>
      </div>
    </div>
    <div class="header-right">
      <span class="clock" id="clock"></span>
      <button class="theme-toggle" id="themeToggle" title="Tag/Nacht-Modus">&#9790;</button>
      <a href="/admin.html" class="admin-link" title="Admin-Bereich">&#9881;&#65039;</a>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-layout">

    <!-- Left Sidebar: Links -->
    <aside class="sidebar sidebar-left">
      <h2 class="sidebar-title">Schnelllinks</h2>
      <div id="linksContainer"></div>
    </aside>

    <!-- Center: Tiles + Kanban -->
    <main class="content">
      <h2 class="section-title">Programme</h2>
      <div class="tiles-grid" id="tilesContainer"></div>

      <!-- Kanban Board -->
      <div id="kanbanSection" style="display:none;">
        <h2 class="section-title kanban-title">Kanban-Board</h2>
        <div class="kanban-board" id="kanbanBoard">
          <div class="kanban-column" data-column="idee">
            <div class="kanban-column-header kanban-col-idee">
              <span>&#128161; Idee</span>
              <span class="kanban-count" id="count-idee">0</span>
            </div>
            <div class="kanban-cards" id="cards-idee"></div>
            <div class="kanban-add">
              <input type="text" class="kanban-add-input" id="add-idee" placeholder="Neue Idee..." maxlength="200">
            </div>
          </div>
          <div class="kanban-column" data-column="geplant">
            <div class="kanban-column-header kanban-col-geplant">
              <span>&#128197; Geplant</span>
              <span class="kanban-count" id="count-geplant">0</span>
            </div>
            <div class="kanban-cards" id="cards-geplant"></div>
            <div class="kanban-add">
              <input type="text" class="kanban-add-input" id="add-geplant" placeholder="Neuer Eintrag..." maxlength="200">
            </div>
          </div>
          <div class="kanban-column" data-column="umsetzung">
            <div class="kanban-column-header kanban-col-umsetzung">
              <span>&#9881;&#65039; In Umsetzung</span>
              <span class="kanban-count" id="count-umsetzung">0</span>
            </div>
            <div class="kanban-cards" id="cards-umsetzung"></div>
            <div class="kanban-add">
              <input type="text" class="kanban-add-input" id="add-umsetzung" placeholder="Neuer Eintrag..." maxlength="200">
            </div>
          </div>
          <div class="kanban-column" data-column="erledigt">
            <div class="kanban-column-header kanban-col-erledigt">
              <span>&#10004;&#65039; Erledigt</span>
              <span class="kanban-count" id="count-erledigt">0</span>
            </div>
            <div class="kanban-cards" id="cards-erledigt"></div>
            <div class="kanban-add">
              <input type="text" class="kanban-add-input" id="add-erledigt" placeholder="Neuer Eintrag..." maxlength="200">
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Right Sidebar: Widgets -->
    <aside class="sidebar sidebar-right">

      <div class="widget" id="moodWidget">
        <h3 class="widget-title">&#128522; Stimmungsbarometer</h3>
        <div class="widget-body">
          <div class="mood-input" id="moodInput">
            <div class="mood-input-area">
              <div class="mood-buttons">
                <button class="mood-btn mood-bad-btn" data-mood="1" title="Schlecht">&#128544;</button>
                <button class="mood-btn mood-ok-btn" data-mood="2" title="Neutral">&#128528;</button>
                <button class="mood-btn mood-good-btn" data-mood="3" title="Gut">&#128522;</button>
              </div>
              <div class="mood-comment-area" id="moodCommentArea" style="display:none;">
                <input type="text" class="mood-comment" id="moodComment" placeholder="Kommentar (optional)..." maxlength="500">
                <button class="mood-submit" id="moodSubmit">Absenden</button>
              </div>
            </div>
            <div class="mood-success" id="moodSuccess" style="display:none;">Danke! &#10004;</div>
          </div>
          <div class="mood-summary" id="moodSummary">
            <div class="mood-avg" id="moodAvg"></div>
            <div class="mood-count" id="moodCount"></div>
          </div>
          <a href="/mood-stats.html" class="mood-stats-link">&#128202; Statistik anzeigen</a>
        </div>
      </div>

      <div class="widget" id="vacationWidget">
        <h3 class="widget-title">&#127796; Urlaub</h3>
        <div class="widget-body" id="vacationBody">Laden...</div>
      </div>

      <div class="widget" id="birthdayWidget">
        <h3 class="widget-title">&#127874; Geburtstage</h3>
        <div class="widget-body" id="birthdayBody">Laden...</div>
      </div>

      <div class="widget" id="coverageWidget">
        <h3 class="widget-title">&#128100; Vertretungen</h3>
        <div class="widget-body" id="coverageBody">Laden...</div>
      </div>

    </aside>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
